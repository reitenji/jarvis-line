name: CI

on:
  push:
  pull_request:

jobs:
  smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Syntax check
        run: python -m compileall -q src/jarvis_line
      - name: Smoke tests
        run: python tests/run_smoke.py
        env:
          PYTHONPATH: src
      - name: Pytest
        run: |
          python -m pip install -e ".[test]"
          python -m pytest -q
      - name: Build wheel for isolated install check
        if: matrix.python-version == '3.12'
        run: |
          python -m pip install --upgrade build
          python -m build --wheel --outdir clean-dist
      - name: Verify clean install and uninstall
        if: matrix.python-version == '3.12'
        run: python scripts/verify_clean_install.py clean-dist
      - name: Generate SPDX SBOM smoke artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ./clean-dist
          format: spdx-json
          output-file: ./clean-dist/jarvis-line-ci.spdx.json
          syft-version: v1.42.3
          upload-artifact: false
          upload-release-assets: false
      - name: Validate SPDX SBOM smoke artifact
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        run: python -c "import json; data=json.load(open('clean-dist/jarvis-line-ci.spdx.json', encoding='utf-8')); assert data['spdxVersion'].startswith('SPDX-')"

  macos-app:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Verify version metadata
        run: python scripts/check_version_consistency.py
      - name: Test Swift package
        run: swift test --package-path apps/macos/JarvisLine
      - name: Verify app and DMG artifacts
        run: bash scripts/verify-macos-artifacts.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: jarvis-line-macos-smoke
          path: |
            apps/macos/JarvisLine/dist/JarvisLine-macOS.dmg
            apps/macos/JarvisLine/dist/JarvisLine-macOS.dmg.sha256
          if-no-files-found: error
          retention-days: 7
