name: Extended Runtime Soak

on:
  workflow_dispatch:
  schedule:
    - cron: "17 4 * * 1"

permissions:
  contents: read

concurrency:
  group: soak-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  extended-soak:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Extended runtime soak
        run: python scripts/soak_runtime.py --mode extended --seed 1 --output soak-report.json
        env:
          PYTHONPATH: src
      - name: Upload privacy-safe soak report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: soak-report-${{ matrix.os }}
          path: soak-report.json
          if-no-files-found: warn
          retention-days: 7
