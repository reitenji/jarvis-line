name: Security

on:
  pull_request:
    branches: [develop, main]
    paths:
      - "pyproject.toml"
      - "src/**"
      - ".github/workflows/security.yml"
  push:
    branches: [develop, main]
    paths:
      - "pyproject.toml"
      - "src/**"
      - ".github/workflows/security.yml"
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-dependencies:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project and audit tool
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[kokoro,security,test]"
      - name: Audit installed Python dependencies
        run: python -m pip_audit --local --skip-editable
