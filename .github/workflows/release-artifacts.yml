name: Release Artifacts

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Verify tag, version, and main ancestry
        shell: bash
        run: |
          python scripts/check_version_consistency.py
          test "${GITHUB_REF_NAME#v}" = "$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          git merge-base --is-ancestor "$GITHUB_SHA" origin/main || {
            echo "Release tag must point to a commit contained in main." >&2
            exit 1
          }

  python:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Build Python artifacts
        run: |
          python -m pip install --upgrade build twine
          python -m build
          python -m twine check dist/*
      - name: Unpack release wheel for SBOM cataloging
        run: |
          mkdir -p build/sbom-wheel
          python -m zipfile -e dist/jarvis_line-*.whl build/sbom-wheel
      - name: Generate tag-scoped SPDX SBOM from built artifacts
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: ./build/sbom-wheel
          format: spdx-json
          output-file: ./dist/jarvis-line.spdx.json
          syft-version: v1.42.3
          upload-artifact: false
          upload-release-assets: false
      - name: Validate release SBOM package catalog
        run: python scripts/validate_sbom.py dist/jarvis-line.spdx.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: python-artifacts
          path: dist/*
          if-no-files-found: error

  macos:
    needs: verify
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Test Swift package
        run: swift test --package-path apps/macos/JarvisLine
      - name: Build and verify macOS artifacts
        run: bash scripts/verify-macos-artifacts.sh
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: macos-artifacts
          path: |
            apps/macos/JarvisLine/dist/JarvisLine-macOS.dmg
            apps/macos/JarvisLine/dist/JarvisLine-macOS.dmg.sha256
          if-no-files-found: error

  publish:
    needs: [python, macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: release-artifacts
          merge-multiple: true
      - name: Create combined checksums
        working-directory: release-artifacts
        run: sha256sum -- * | grep -v 'SHA256SUMS' > SHA256SUMS
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release view "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            || gh release create "$GITHUB_REF_NAME" --repo "$GITHUB_REPOSITORY" --generate-notes --title "$GITHUB_REF_NAME"
          gh release upload "$GITHUB_REF_NAME" release-artifacts/* --repo "$GITHUB_REPOSITORY" --clobber
