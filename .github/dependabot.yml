version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5

  - package-ecosystem: github-actions
    directory: "/"
    target-branch: develop
    schedule:
      interval: weekly
      day: monday
      time: "04:45"
      timezone: Europe/Istanbul
    open-pull-requests-limit: 5
