name: Bug report
description: Report a reproducible Jarvis Line problem with a reviewed support report.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Jarvis Line.

        Before submitting, run:

        ```bash
        jarvis-line doctor
        jarvis-line support-report --output ./jarvis-line-issue.md
        ```

        Open the generated Markdown, review it, remove anything you do not want public, and paste the relevant sections below. Do not upload ZIP files, secrets, or raw private logs.
  - type: checkboxes
    id: checklist
    attributes:
      label: Preflight
      options:
        - label: I ran `jarvis-line doctor`, or I explain below why it could not run.
          required: true
        - label: I reviewed the generated support report before including it.
          required: true
        - label: I removed secrets, private paths, and unrelated log content.
          required: true
        - label: I searched existing issues and discussions for the same problem.
          required: true
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Describe the problem and its impact in a few sentences.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run ...
        2. Start ...
        3. Observe ...
    validations:
      required: true
  - type: dropdown
    id: tts
    attributes:
      label: TTS backend
      options:
        - Kokoro
        - System TTS
        - macOS say
        - Custom command or API wrapper
        - Unknown or not applicable
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS
        - Linux
        - Windows
        - Other
    validations:
      required: true
  - type: textarea
    id: support_report
    attributes:
      label: Reviewed support report
      description: Paste the reviewed contents of `jarvis-line-issue.md`, or explain why the command could not run.
      placeholder: Paste the reviewed report here. Remove anything you do not want public.
    validations:
      required: true
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Add screenshots or details that are not already present in the support report.
