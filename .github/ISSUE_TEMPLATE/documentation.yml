name: Documentation problem
description: Report missing, incorrect, or confusing Jarvis Line documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: checkboxes
    id: preflight
    attributes:
      label: Preflight
      options:
        - label: I searched existing issues and discussions for the same documentation problem.
          required: true
  - type: input
    id: location
    attributes:
      label: Documentation location
      description: Link the README section, documentation page, command output, or app screen.
      placeholder: https://github.com/reitenji/jarvis-line/blob/main/README.md
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What is unclear or incorrect?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested improvement
      description: Describe the wording or example that would have helped.
